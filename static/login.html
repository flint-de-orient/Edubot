<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduBot | Sign In</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

        :root {
            --brand: #6366f1;
            --brand-soft: rgba(99, 102, 241, 0.1);
            --bg: #0f172a;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background: url('https://images.unsplash.com/photo-1483354483454-4cd359948304?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-main);
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.7);
            z-index: 0;
        }

        .login-card {
            background: var(--card);
            width: 100%;
            max-width: 440px;
            padding: 48px;
            border-radius: 32px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 5px;
            background: linear-gradient(90deg, #6366f1, #a855f7);
        }

        .header { margin-bottom: 32px; text-align: left; }
        .header h1 { font-size: 2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; color: #0f172a; }
        .header p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; color: #334155; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input {
            width: 100%;
            padding: 14px 20px;
            background: #f8fafc;
            border: 2px solid #f1f5f9;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #1e293b;
        }

        input:focus {
            outline: none;
            background: #fff;
            border-color: var(--brand);
            box-shadow: 0 0 0 4px var(--brand-soft);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: #0f172a;
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: var(--brand);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
        }

        .msg { padding: 14px; border-radius: 12px; margin-bottom: 24px; font-size: 0.9rem; font-weight: 600; display: none; text-align: center; }
        .error { background: #fff1f2; color: #e11d48; }
        .success { background: #f0fdf4; color: #16a34a; }

        .footer { text-align: center; margin-top: 32px; font-size: 0.9rem; color: var(--text-muted); }
        .footer a { color: var(--brand); text-decoration: none; font-weight: 700; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="header">
            <h1>Welcome back</h1>
            <p>Enter your credentials to access your EduBot workspace.</p>
        </div>

        <div id="statusMsg" class="msg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="name@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">Continue</button>
        </form>

        <div class="footer">
            New to EduBot? <a href="signup.html">Create an account</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const statusMsg = document.getElementById('statusMsg');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                
                if (data.success) {
                    // Store login session
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('username', username);
                    
                    statusMsg.className = "msg success";
                    statusMsg.textContent = "Identity verified. Redirecting...";
                    statusMsg.style.display = "block";
                    setTimeout(() => window.location.href = 'index.html', 1200);
                } else {
                    statusMsg.className = "msg error";
                    statusMsg.textContent = data.message;
                    statusMsg.style.display = "block";
                }
            } catch (err) {
                statusMsg.className = "msg error";
                statusMsg.textContent = "Service unavailable. Try again later.";
                statusMsg.style.display = "block";
            }
        });
    </script>
</body>
</html>
